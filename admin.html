<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Control Center | LMS</title>

  <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <h2>Admin Control</h2>

    <nav>
      <a href="dashboard.html">Dashboard</a>
      <a href="courses.html">Courses</a>
      <a href="grades.html">Grades</a>
      <a href="assignments.html">Assignments</a>
      <a href="admin.html">Admin Panel</a>
    </nav>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <!-- HEADER -->
    <section class="card">
      <h1>Admin Dashboard</h1>
      <p>Full instructor + system control (Firebase-powered)</p>
    </section>

    <!-- SYSTEM STATS -->
    <section class="grid">

      <div class="card">
        <h3>Students</h3>
        <p id="statStudents">--</p>
      </div>

      <div class="card">
        <h3>Courses</h3>
        <p id="statCourses">--</p>
      </div>

      <div class="card">
        <h3>Assignments</h3>
        <p id="statAssignments">--</p>
      </div>

    </section>

    <!-- COURSE MANAGEMENT -->
    <section class="card">
      <h2>Course Management</h2>

      <input placeholder="Course Name">
      <input placeholder="Course Code">
      <input placeholder="Credits">
      <input placeholder="Semester">

      <button>Create / Update Course</button>

      <div id="courseListAdmin"></div>
    </section>

    <!-- ASSIGNMENT MANAGEMENT -->
    <section class="card">
      <h2>Assignment Manager</h2>

      <input placeholder="Title">
      <input placeholder="Course">
      <input placeholder="Due Date">

      <select>
        <option>Homework</option>
        <option>Lab</option>
        <option>Quiz</option>
        <option>Exam</option>
      </select>

      <button>Create Assignment</button>

      <div id="assignmentListAdmin"></div>
    </section>

    <!-- GRADEBOOK -->
    <section class="card">
      <h2>Gradebook</h2>

      <div id="gradebook"></div>

      <button>Save Grades</button>
    </section>

    <!-- GRADE SCALE -->
    <section class="card">
      <h2>Grade Scale</h2>

      <div class="grid">

        <div class="card"><label>A</label><input value="4.00"></div>
        <div class="card"><label>A-</label><input value="3.67"></div>
        <div class="card"><label>B+</label><input value="3.33"></div>
        <div class="card"><label>B</label><input value="3.00"></div>
        <div class="card"><label>B-</label><input value="2.67"></div>
        <div class="card"><label>C+</label><input value="2.33"></div>
        <div class="card"><label>C</label><input value="2.00"></div>
        <div class="card"><label>C-</label><input value="1.67"></div>
        <div class="card"><label>D+</label><input value="1.33"></div>
        <div class="card"><label>D</label><input value="1.00"></div>
        <div class="card"><label>D-</label><input value="0.67"></div>
        <div class="card"><label>F</label><input value="0.00"></div>

      </div>

      <button>Save Grade Scale</button>
    </section>

    <!-- USER MANAGEMENT -->
    <section class="card">
      <h2>User Management</h2>

      <input placeholder="Student Email">
      <button>Add Student</button>

      <div id="userList"></div>
    </section>

    <!-- SYSTEM ACTIONS -->
    <section class="card">
      <h2>System Controls</h2>

      <button>Sync Firebase</button>
      <button>Recalculate GPA</button>
      <button>Export Data</button>
      <button>Reset Cache</button>

    </section>

  </main>

</div>

<script type="module" src="app.js"></script>

</body>
</html>
