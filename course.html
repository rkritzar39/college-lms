<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Course</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="app">

  <div class="sidebar">
    <h2>Course</h2>
    <a href="index.html">Dashboard</a>
  </div>

  <div class="main">

    <div class="topbar">
      <h1 id="title"></h1>
    </div>

    <div class="content">

      <div id="modules"></div>

      <h3>Assignments</h3>
      <div id="assignments"></div>

    </div>

  </div>

</div>

<script src="app.js"></script>

<script>
const id=new URLSearchParams(location.search).get("id");

const course=getCourse(id);
document.getElementById("title").innerText=course.name;

/* MODULES */
const mEl=document.getElementById("modules");

db.modules
  .filter(m=>m.courseId===id)
  .forEach(m=>{

    const div=document.createElement("div");
    div.className="card";

    div.innerHTML=`
      <h3>${m.title}</h3>
      <ul>
        ${m.items.map(i=>`<li>${i}</li>`).join("")}
      </ul>
    `;

    mEl.appendChild(div);
  });

/* ASSIGNMENTS */
const aEl=document.getElementById("assignments");

db.assignments
  .filter(a=>a.courseId===id)
  .forEach(a=>{

    const div=document.createElement("div");
    div.className="card";

    div.innerHTML=`
      <strong>${a.title}</strong>
      <p>Grade: ${a.grade ?? "Not graded"}</p>
    `;

    aEl.appendChild(div);
  });
</script>
</body>
</html>
