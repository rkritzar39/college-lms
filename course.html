<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Course</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="app">

  <div class="sidebar">
    <h2>Course</h2>
    <a href="index.html">Dashboard</a>
  </div>

  <div class="main">

    <div class="topbar">
      <h1 id="title"></h1>
    </div>

    <div class="content">

      <div id="modules"></div>

      <h3>Assignments</h3>
      <div id="assignments"></div>

    </div>

  </div>

</div>

<script src="app.js"></script>

<script>
const id = new URLSearchParams(location.search).get("id");

const course = getCourse(id);
document.getElementById("title").innerText = course.name;

/* ================= MODULE STATE ================= */

const stateKey = "module-state-" + id;
let moduleState = JSON.parse(localStorage.getItem(stateKey)) || {};

/* ================= MODULES ================= */

const mEl = document.getElementById("modules");

db.modules
  .filter(m => m.courseId === id)
  .forEach(m => {

    const isOpen = moduleState[m.id] ?? true;

    const div = document.createElement("div");
    div.className = "card module";

    div.innerHTML = `
      <div class="module-header" data-id="${m.id}">
        <span class="arrow">${isOpen ? "▼" : "▶"}</span>
        <strong>${m.title}</strong>
      </div>

      <div class="module-body" style="display:${isOpen ? "block" : "none"}">
        <ul>
          ${m.items.map(i => `<li>${i}</li>`).join("")}
        </ul>
      </div>
    `;

    mEl.appendChild(div);
  });

/* ================= TOGGLE ================= */

document.querySelectorAll(".module-header").forEach(header => {
  header.onclick = () => {

    const id = header.dataset.id;
    const body = header.nextElementSibling;
    const arrow = header.querySelector(".arrow");

    const open = body.style.display === "block";

    body.style.display = open ? "none" : "block";
    arrow.textContent = open ? "▶" : "▼";

    moduleState[id] = !open;
    localStorage.setItem(stateKey, JSON.stringify(moduleState));
  };
});

/* ================= ASSIGNMENTS ================= */

const aEl = document.getElementById("assignments");

db.assignments
  .filter(a => a.courseId === id)
  .forEach(a => {

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <strong>${a.title}</strong>
      <p>Grade: ${a.grade ?? "Not graded"}</p>
    `;

    aEl.appendChild(div);
  });
</script>
</body>
</html>
