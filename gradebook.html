<div class="app">

  <aside class="sidebar">
    <h2>Gradebook</h2>
    <a href="index.html">Dashboard</a>
  </aside>

  <main class="main">

    <div class="topbar">
      <h1>Gradebook</h1>
    </div>

    <div class="content">
      <div id="grades"></div>

      <div class="card">
        <h3>GPA</h3>
        <p id="gpa"></p>
      </div>
    </div>

  </main>

</div>

<script src="app.js"></script>

<script>
const el = document.getElementById("grades");

db.assignments.forEach(a => {

  const course = db.courses.find(c => c.id === a.courseId);

  const div = document.createElement("div");
  div.className = "card";

  div.innerHTML = `
    <strong>${course.name}</strong>
    <p>${a.title}</p>
    <p>Grade: ${a.grade ?? "-"}</p>
  `;

  el.appendChild(div);
});

document.getElementById("gpa").innerText = gpa().toFixed(2);
</script>
