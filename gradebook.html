<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Gradebook</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="app">

  <div class="sidebar">
    <h2>Gradebook</h2>
    <a href="index.html">Dashboard</a>
  </div>

  <div class="main">

    <div class="topbar">
      <h1>Gradebook</h1>
    </div>

    <div class="content" id="grades"></div>

    <div class="content">
      <div class="card">
        <h3>GPA</h3>
        <p id="gpa"></p>
      </div>
    </div>

  </div>

</div>

<script src="app.js"></script>

<script>
const el=document.getElementById("grades");

db.assignments.forEach(a=>{

  const course=getCourse(a.courseId);

  const div=document.createElement("div");
  div.className="card";

  div.innerHTML=`
    <strong>${course.name}</strong>
    <p>${a.title}</p>
    <p>Grade: ${a.grade ?? "-"}</p>
  `;

  el.appendChild(div);
});

document.getElementById("gpa").innerText=gpa().toFixed(2);
</script>

</body>
</html>
