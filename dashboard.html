<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | LMS Portfolio</title>

  <!-- External CSS -->
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <h2>LMS Portfolio</h2>

    <nav>
      <a href="index.html">Home</a>
      <a href="dashboard.html">Dashboard</a>
      <a href="courses.html">Courses</a>
      <a href="grades.html">Grades</a>
      <a href="assignments.html">Assignments</a>
    </nav>
  </aside>

  <!-- MAIN DASHBOARD -->
  <main class="main">

    <!-- Header / Profile Bar -->
    <section class="card">
      <h1>Academic Dashboard</h1>
      <p>Live Firebase-powered student performance overview</p>
    </section>

    <!-- Loading State -->
    <section id="loading" class="card">
      <h2>Loading academic data...</h2>
      <p>Connecting to Firebase Firestore</p>
    </section>

    <!-- Dashboard Content -->
    <section id="dashboardContent" style="display:none;">

      <!-- Top Stats Grid -->
      <div class="grid">

        <!-- GPA -->
        <div class="card">
          <h3>GPA</h3>
          <p id="gpaValue">--</p>
        </div>

        <!-- Credits -->
        <div class="card">
          <h3>Total Credits</h3>
          <p id="creditValue">--</p>
        </div>

        <!-- Course Count -->
        <div class="card">
          <h3>Active Courses</h3>
          <p id="courseCount">--</p>
        </div>

      </div>

      <!-- Courses Section -->
      <section class="card">
        <h2>Current Courses</h2>
        <div id="courseList"></div>
      </section>

      <!-- Assignments Section -->
      <section class="card">
        <h2>Recent Assignments</h2>
        <div id="assignmentList"></div>
      </section>

    </section>

  </main>

</div>

<!-- External JS (Firebase + rendering logic) -->
<script type="module" src="app.js"></script>

</body>
</html>
