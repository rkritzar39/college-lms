<div class="app">

  <div class="sidebar">
    <h2>College LMS</h2>
    <a href="index.html">Dashboard</a>
    <a href="gradebook.html">Gradebook</a>
    <a href="instructor.html">Instructor</a>
  </div>

  <div class="main">

    <div class="topbar">
      <h1>Dashboard</h1>
    </div>

    <div class="content" id="dashboard"></div>

  </div>

</div>

<script src="app.js"></script>

<script>
const el=document.getElementById("dashboard");

db.courses.forEach(c=>{

  const assignments=db.assignments.filter(a=>a.courseId===c.id);
  const avg=assignments.reduce((s,a)=>s+(a.grade||0),0)/(assignments.length||1);

  const div=document.createElement("div");
  div.className="card";

  div.innerHTML=`
    <h3>${c.name}</h3>

    <div class="bar">
      <div style="width:${avg}%"></div>
    </div>

    <p>${Math.round(avg)}%</p>

    <a href="course.html?id=${c.id}">Open</a>
  `;

  el.appendChild(div);
});
</script>
