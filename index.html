<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="app">

  <div class="sidebar">
    <h2>College LMS</h2>
    <a href="index.html">Dashboard</a>
    <a href="gradebook.html">Gradebook</a>
    <a href="instructor.html">Instructor</a>
  </div>

  <div class="main">

    <div class="topbar">
      <h1>Semesters</h1>
    </div>

    <div class="content" id="root"></div>

  </div>

</div>

<script src="app.js"></script>

<script>
const root=document.getElementById("root");

db.semesters.forEach(s=>{

  const box=document.createElement("div");
  box.className="card";

  box.innerHTML=`<h2>${s.name}</h2>`;

  db.courses
    .filter(c=>c.semester===s.id)
    .forEach(c=>{

      const avg=db.assignments
        .filter(a=>a.courseId===c.id)
        .reduce((s,a)=>s+(a.grade||0),0);

      const div=document.createElement("div");
      div.className="card";

      div.innerHTML=`
        <h3>${c.name}</h3>

        <div class="bar">
          <div style="width:${avg}%"></div>
        </div>

        <a href="course.html?id=${c.id}">Open</a>
      `;

      box.appendChild(div);
    });

  root.appendChild(box);
});
</script>

</body>
</html>
