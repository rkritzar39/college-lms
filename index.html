<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Academic LMS Portfolio</title>

  <!-- External CSS ONLY -->
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="app">

  <!-- SIDEBAR (static navigation only) -->
  <aside class="sidebar">
    <h2>LMS Portfolio</h2>

    <nav>
      <a href="index.html">Home</a>
      <a href="dashboard.html">Dashboard</a>
      <a href="courses.html">Courses</a>
      <a href="grades.html">Grades</a>
      <a href="assignments.html">Assignments</a>
    </nav>
  </aside>

  <!-- MAIN CONTENT (Firebase-rendered) -->
  <main class="main">

    <!-- Loading state -->
    <section id="loading" class="card">
      <h2>Loading Academic System...</h2>
      <p>Connecting to secure database...</p>
    </section>

    <!-- App content (hidden until JS loads Firebase data) -->
    <section id="appContent" style="display:none;">

      <div class="card">
        <h1>Academic Portfolio System</h1>
        <p>Live Firebase-powered LMS dashboard</p>
      </div>

      <div class="grid">

        <div class="card">
          <h3>GPA</h3>
          <p id="gpaValue">--</p>
        </div>

        <div class="card">
          <h3>Courses</h3>
          <div id="courseList"></div>
        </div>

        <div class="card">
          <h3>Assignments</h3>
          <div id="assignmentList"></div>
        </div>

      </div>

    </section>

  </main>

</div>

<!-- External JS ONLY -->
<script type="module" src="app.js"></script>

</body>
</html>
