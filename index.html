<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>College LMS</h2>
    <a href="index.html">Dashboard</a>
    <a href="gradebook.html">Gradebook</a>
    <a href="instructor.html">Instructor</a>
  </div>

  <!-- MAIN -->
  <div class="main">

    <div class="topbar">
      <h1>Academic Dashboard</h1>
    </div>

    <div class="content" id="dashboard"></div>

  </div>

</div>

<script src="app.js"></script>

<script>
const root = document.getElementById("dashboard");

/* ================= SEMESTER GROUPING ================= */

db.semesters.forEach(sem => {

  const semesterBox = document.createElement("div");
  semesterBox.className = "card";

  semesterBox.innerHTML = `<h2>${sem.name}</h2>`;

/* FILTER COURSES */
  const courses = db.courses.filter(c => c.semester === sem.id);

  courses.forEach(c => {

    const assignments = db.assignments.filter(a => a.courseId === c.id);

    const avg = assignments.length
      ? assignments.reduce((s,a)=>s+(a.grade||0),0)/assignments.length
      : 0;

    const courseCard = document.createElement("div");
    courseCard.className = "card";

    courseCard.innerHTML = `

      <h3>${c.name}</h3>

      <div class="bar">
        <div style="width:${avg}%"></div>
      </div>

      <p style="margin:6px 0;color:#6b7785;">
        ${Math.round(avg)}% progress
      </p>

      <a href="course.html?id=${c.id}">
        Open Course
      </a>

    `;

    semesterBox.appendChild(courseCard);

  });

  root.appendChild(semesterBox);

});
</script>

</body>
</html>
